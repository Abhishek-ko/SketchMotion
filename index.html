<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SketchMotion Pro</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="header-left">
    <span>✏️</span>
    <h1>SketchMotion <span class="version">PRO</span></h1>
  </div>
  <div class="header-actions">
    <button id="undoBtn">↩ Undo</button>
    <button id="redoBtn">↪ Redo</button>
    <button id="downloadBtn" class="btn-download">⬇ Download GIF</button>
    <button id="clearFrame" class="btn-danger">🗑️ Clear</button>
  </div>
</header>

<div class="toolbar">
  <div class="tool-group">
    <span class="label">Color</span>
    <input type="color" id="colorPicker" value="#000000">
  </div>
  <div class="tool-group">
    <span class="label">Tools</span>
    <button id="pencilBtn" class="active">✏️ Pencil</button>
    <button id="eraserBtn">🧽 Eraser</button>
    <button id="fillBtn">🪣 Fill</button>
    <button id="selectBtn">⬚ Select</button>
  </div>
  <div class="tool-group">
    <span class="label">Size</span>
    <input type="range" id="sizeSlider" min="1" max="50" value="5">
    <span id="sizeVal">5</span>
  </div>
  <div class="tool-group">
    <span class="label">BG</span>
    <input type="color" id="bgColorPicker" value="#ffffff">
  </div>
  <div class="tool-group no-border">
    <button id="play" class="btn-success">▶ Play</button>
    <span class="label" style="margin-left:8px">FPS</span>
    <input type="range" id="speed" min="1" max="24" value="12">
    <span id="speedVal">12</span>
  </div>
</div>

<div id="selectionToolbar" class="selection-toolbar hidden">
  <span class="label">Selection:</span>
  <button id="copySelBtn">📋 Copy</button>
  <button id="pasteSelBtn">📌 Paste</button>
  <button id="deleteSelBtn" class="btn-danger">✂️ Delete</button>
  <span class="hint">Drag to select • Drag to move</span>
</div>

<div class="workspace">
  <div class="canvas-wrapper" id="canvasWrapper">
    <canvas id="onionCanvas" width="800" height="450"></canvas>
    <canvas id="canvas"      width="800" height="450"></canvas>
    <canvas id="selCanvas"   width="800" height="450"></canvas>
  </div>
</div>

<div class="controls">
  <div class="timeline-box">
    <span class="timeline-label">🎞 Frames</span>
    <div id="frameContainer"></div>
    <div class="timeline-actions">
      <button id="copyFrame" class="btn-accent">⧉ Copy Frame</button>
      <button id="addFrame"  class="btn-primary">+ New Frame</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
