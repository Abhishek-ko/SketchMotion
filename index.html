<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SketchMotion Pro</title>
    <link rel="stylesheet" href="style.css">
    <!-- gif.js — lets us export a real animated GIF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js" crossorigin="anonymous"></script>
</head>
<body>

<header>
    <div class="header-left">
        <span class="logo-icon">✏️</span>
        <h1>SketchMotion <span class="version">PRO</span></h1>
    </div>
    <div class="header-actions">
        <button id="undoBtn" title="Undo (Ctrl+Z)">↩ Undo</button>
        <button id="redoBtn" title="Redo (Ctrl+Y)">↪ Redo</button>
        <button id="downloadBtn" class="btn-download" title="Download animation as GIF">⬇ Download GIF</button>
        <button id="clearFrame" class="btn-danger">🗑️ Clear</button>
    </div>
</header>

<div class="toolbar">
    <div class="tool-group">
        <span class="label">Color</span>
        <input type="color" id="colorPicker" title="Brush Color" value="#000000">
    </div>

    <div class="tool-group">
        <span class="label">Tools</span>
        <button id="pencilBtn" class="active tool-btn" title="Pencil">✏️ Pencil</button>
        <button id="eraserBtn" class="tool-btn" title="Eraser">🧽 Eraser</button>
        <button id="fillBtn" class="tool-btn" title="Fill Bucket">🪣 Fill</button>
        <button id="selectBtn" class="tool-btn" title="Select / Move">⬚ Select</button>
    </div>

    <div class="tool-group">
        <span class="label">Size</span>
        <input type="range" id="sizeSlider" min="1" max="50" value="5">
        <span id="sizeVal">5</span>
    </div>

    <div class="tool-group">
        <span class="label">Canvas BG</span>
        <input type="color" id="bgColorPicker" title="Background Color" value="#ffffff">
    </div>

    <div class="tool-group no-border">
        <button id="play" class="btn-success">▶ Play</button>
        <span class="label" style="margin-left:10px;">FPS</span>
        <input type="range" id="speed" min="1" max="24" value="12">
        <span id="speedVal">12</span>
    </div>
</div>

<!-- Selection toolbar (shown only when select tool is active) -->
<div id="selectionToolbar" class="selection-toolbar hidden">
    <span class="label">Selection:</span>
    <button id="copySelectionBtn">📋 Copy Selection</button>
    <button id="pasteSelectionBtn">📌 Paste</button>
    <button id="deleteSelectionBtn" class="btn-danger">✂️ Delete</button>
    <span class="hint">Drag to select • Drag selection to move</span>
</div>

<div class="workspace">
    <div class="canvas-wrapper">
        <!-- Onion skin layer (behind main canvas) -->
        <canvas id="onionCanvas" width="800" height="450"></canvas>
        <!-- Main drawing canvas -->
        <canvas id="canvas" width="800" height="450"></canvas>
        <!-- Selection overlay canvas -->
        <canvas id="selectionCanvas" width="800" height="450"></canvas>
    </div>
</div>

<div class="controls">
    <div class="timeline-box">
        <span class="timeline-label">🎞 Frames</span>
        <div id="frameContainer"></div>
        <div class="timeline-actions">
            <button id="copyFrame" class="btn-accent" title="Duplicate current frame">⧉ Copy Frame</button>
            <button id="addFrame" class="btn-primary">＋ New Frame</button>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
